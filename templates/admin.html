<!DOCTYPE html>
<html>
<head>
    <title>License Server Admin</title>
    <style>
        body { font-family: Arial; margin: 20px; background: #f5f5f5; }
        .container { max-width: 1200px; margin: auto; background: white; padding: 20px; border-radius: 8px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 10px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background: #2c3e50; color: white; }
        .valid { color: green; font-weight: bold; }
        .expired { color: red; }
        .revoked { color: gray; }
        button { padding: 5px 10px; cursor: pointer; }
        .generate-form { background: #ecf0f1; padding: 15px; margin-bottom: 20px; border-radius: 5px; }
        input, select { padding: 8px; margin: 5px; width: 200px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔑 License Server Administration</h1>
        
        <!-- Generate License Form -->
        <div class="generate-form">
            <h2>Generate New License</h2>
            <input type="text" id="productId" placeholder="Product ID" value="GREED-TOOL">
            <input type="number" id="maxActivations" placeholder="Max Activations" value="1">
            <select id="expiryType">
                <option value="hours">Hours</option>
                <option value="days">Days</option>
                <option value="permanent">Permanent (Year 9999)</option>
            </select>
            <input type="number" id="expiryAmount" placeholder="Amount" value="1" min="1">
            <button onclick="generateLicense()">Generate License</button>
            <div id="newLicense" style="margin-top:10px; display:none;">
                <strong>New License Key:</strong>
                <input type="text" id="licenseKeyOutput" readonly style="width:300px;">
                <button onclick="copyLicense()">Copy</button>
            </div>
        </div>
        
        <!-- Licenses Table -->
        <h2>Active Licenses</h2>
        <table id="licensesTable">
            <thead>
                <tr>
                    <th>License Key</th>
                    <th>Username</th>
                    <th>Product</th>
                    <th>Activations</th>
                    <th>Expires</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="licensesBody">
                <!-- Filled by JavaScript -->
            </tbody>
        </table>
    </div>
    
    <script>
        // UPDATE THIS: Replace with your actual ADMIN_API_KEY from .env file
        const API_KEY = '5ZfR2Vn8QmL3YpJ6HsT4Wc9KdX0Ea';
        
        async function loadLicenses() {
            const response = await fetch('/admin/api/licenses', {
                headers: { 'X-API-Key': API_KEY }
            });
            const data = await response.json();
            
            const tbody = document.getElementById('licensesBody');
            tbody.innerHTML = '';
            
            data.licenses.forEach(lic => {
                const row = tbody.insertRow();
                
                // License Key
                row.insertCell().textContent = lic.license_key;
                
                // Username
                row.insertCell().textContent = lic.username || 'Unassigned';
                
                // Product
                row.insertCell().textContent = lic.product_id;
                
                // Activations
                row.insertCell().textContent = `${lic.activation_count}/${lic.max_activations}`;
                
                // Expires
                const expiryDate = new Date(lic.expires_at);
                row.insertCell().textContent = expiryDate.toLocaleDateString();
                
                // Status
                const statusCell = row.insertCell();
                if (!lic.is_active) {
                    statusCell.textContent = 'REVOKED';
                    statusCell.className = 'revoked';
                } else if (new Date(lic.expires_at) < new Date()) {
                    statusCell.textContent = 'EXPIRED';
                    statusCell.className = 'expired';
                } else {
                    statusCell.textContent = 'ACTIVE';
                    statusCell.className = 'valid';
                }
                
                // Actions
                const actionsCell = row.insertCell();
                if (lic.is_active && new Date(lic.expires_at) >= new Date()) {
                    const revokeBtn = document.createElement('button');
                    revokeBtn.textContent = 'Revoke';
                    revokeBtn.onclick = () => revokeLicense(lic.license_key);
                    revokeBtn.style.background = '#e74c3c';
                    revokeBtn.style.color = 'white';
                    revokeBtn.style.border = 'none';
                    revokeBtn.style.padding = '5px 10px';
                    revokeBtn.style.cursor = 'pointer';
                    actionsCell.appendChild(revokeBtn);
                }
            });
        }
        
        async function generateLicense() {
            const productId = document.getElementById('productId').value;
            const maxActivations = document.getElementById('maxActivations').value;
            const expiryType = document.getElementById('expiryType').value;
            const expiryAmount = document.getElementById('expiryAmount').value;
            
            // Calculate expiry date
            const expires = new Date();
            
            if (expiryType === 'hours') {
                expires.setHours(expires.getHours() + parseInt(expiryAmount));
            } else if (expiryType === 'days') {
                expires.setDate(expires.getDate() + parseInt(expiryAmount));
            } else if (expiryType === 'permanent') {
                // Set to year 9999 for "permanent" licenses
                expires.setFullYear(9999, 11, 31); // December 31, 9999
            }
            
            const response = await fetch('/admin/api/licenses', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-API-Key': API_KEY
                },
                body: JSON.stringify({
                    product_id: productId,
                    max_activations: parseInt(maxActivations),
                    expires_at: expires.toISOString().split('T')[0],
                    features: { "arena_reset": true, "lobby": true }
                })
            });
            
            const data = await response.json();
            document.getElementById('licenseKeyOutput').value = data.license_key;
            document.getElementById('newLicense').style.display = 'block';
            
            // Reload table
            loadLicenses();
        }
        
        async function revokeLicense(licenseKey) {
            if (!confirm(`Revoke license ${licenseKey}?`)) return;
            
            await fetch(`/admin/api/licenses/${licenseKey}/revoke`, {
                method: 'POST',
                headers: { 'X-API-Key': API_KEY }
            });
            
            loadLicenses();
        }
        
        function copyLicense() {
            const key = document.getElementById('licenseKeyOutput');
            key.select();
            document.execCommand('copy');
            alert('License key copied!');
        }
        
        // Load licenses on page load
        loadLicenses();
        // Refresh every 30 seconds
        setInterval(loadLicenses, 30000);
    </script>
</body>
</html>
